{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login ISBEN</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body class="login-body">

<div class="login-card">

    <img src="{% static 'img/logos_2.png' %}" alt="Logo ISBEN" class="login-logo">

    <h2>Iniciar sesión</h2>

    {% if mensaje %}
        <p class="mensaje-error">{{ mensaje }}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        {{ formulario.as_p }}

        <button type="submit">Ingresar</button>
    </form>

    <hr>

    <p style="text-align: center;">¿No tienes cuenta?</p>

    <p style="text-align: center;">
        <a href="{% url 'registro_empresa' %}">Registrar empresa</a>
    </p>

    <p style="text-align: center;">
        <a href="{% url 'registro_vendedor' %}">Registrar vendedor</a>
    </p>

</div>

</body>
</html>
